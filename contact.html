<h1>Contact Norman Zen Group</h1>
<p>Use this form to ask about classes, accessibility, what to expect, or anything else related to practice with the group.</p>

<form accept-charset="UTF-8" action="https://formspree.io/f/meeyrodk" class="form-grid" method="POST"><input aria-hidden="true" autocomplete="off" class="form-honeypot" name="_gotcha" tabindex="-1" type="text"/>

<label for="name">Your name</label>
<input aria-describedby="form-privacy-note" autocomplete="name" id="name" name="name" required="" type="text"/>
</div>
<div>
<label for="email">Your email</label>

</div>

</div>
<div>
<label for="message">Message</label>
<textarea aria-describedby="form-privacy-note" id="message" name="message" required="" rows="7"></textarea>
</div>
<input name="_subject" type="hidden" value="New Norman Zen Group website message"/>
<button class="button contact" type="submit">Send Message</button>
<p class="form-note" id="form-privacy-note">Your email address will be used only to reply to your message.</p>
</form>
